<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sunrisers Hyderabad Fan Page</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #ff7b00, #ffb347);
            color: white;
            text-align: center;
        }
        header {
            background-color: rgba(0, 0, 0, 0.6);
            padding: 20px;
        }
        h1 {
            margin: 0;
            font-size: 2.5em;
        }
        main {
            padding: 30px;
        }
        .card {
            background: rgba(0, 0, 0, 0.5);
            margin: 20px auto;
            padding: 20px;
            border-radius: 10px;
            max-width: 500px;
        }
        button {
            padding: 12px 20px;
            border: none;
            background-color: #000;
            color: #ffb347;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
        }
        button:hover {
            background-color: #222;
        }
    </style>
</head>
<body>

<header>
    <h1>🧡 Sunrisers Hyderabad 🧡</h1>
    <p>Rise with the Orange Army!</p>
</header>

<main>
    <div class="card">
        <h2>About SRH</h2>
        <p>
            Sunrisers Hyderabad (SRH) is a popular IPL team known for its strong bowling attack
            and passionate fan base called the Orange Army.
        </p>
    </div>

    <div class="card">
        <h2>Cheer Message</h2>
        <button onclick="cheer()">Click to Cheer!</button>
        <p id="message"></p>
    </div>
</main>

<script>
    function cheer() {
        document.getElementById("message").innerText = "🔥 Go SRH! Orange Army Forever! 🔥";
    }
</script>

</body>
</html>
